<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- Music staff lines -->
  <line x1="1" y1="3"  x2="15" y2="3"  />
  <line x1="1" y1="6"  x2="15" y2="6"  />
  <line x1="1" y1="9"  x2="15" y2="9"  />
  <line x1="1" y1="12" x2="15" y2="12" />
  <!-- Note stem -->
  <line x1="11" y1="3" x2="11" y2="13" />
  <!-- Note head (filled) -->
  <ellipse cx="9.5" cy="13" rx="2" ry="1.5" fill="currentColor" stroke="none" />
  <!-- Agent dot on staff -->
  <circle cx="5" cy="6" r="1.5" fill="currentColor" stroke="none" />
</svg>
