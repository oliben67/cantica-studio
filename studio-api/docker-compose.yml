services:
  cantica-studio-api:
    build:
      context: ../..        # repo root (cantica-studio/ lives under cantica-project/)
      dockerfile: cantica-studio/studio-api/Dockerfile
    image: cantica-studio-api:latest
    container_name: cantica-studio-api
    restart: unless-stopped
    ports:
      - "${CANTICA_PORT:-8043}:8043"
    volumes:
      - "${CANTICA_HOME:-${HOME}/.cantica}:/cantica-home"
    environment:
      CANTICA_HOME: /cantica-home
      CANTICA_HOST: 0.0.0.0
      CANTICA_PORT: 8043
      CANTICA_LOG_LEVEL: info
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8043/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
