# https://taskfile.dev  —  requires Task ≥ 3.28
version: '3'

includes:
  vscode:
    taskfile: ./clients/vscode/Taskfile.yml
    dir: ./clients/vscode
  studio:
    taskfile: ./clients/studio-app/Taskfile.yml
    dir: ./clients/studio-app

# ── Default ────────────────────────────────────────────────────────────────
tasks:
  default:
    desc: List all available tasks
    silent: true
    cmd: task --list

  # ── Convenience shorthands ────────────────────────────────────────────────
  install:
    desc: Install all UI sub-project dependencies (vscode + studio-app)
    cmds:
      - task: vscode:install
      - task: studio:install

  build:
    desc: Build all UI sub-projects (development mode)
    cmds:
      - task: vscode:compile
      - task: studio:build

  build:prod:
    desc: Build all UI sub-projects (production/minified)
    cmds:
      - task: vscode:compile:prod
      - task: studio:build:prod

  check:
    desc: Run all quality gates across UI sub-projects
    cmds:
      - task: vscode:check

  lint:
    desc: Run ESLint across UI sub-projects
    cmds:
      - task: vscode:lint

  lint:fix:
    desc: Auto-fix ESLint issues across UI sub-projects
    cmds:
      - task: vscode:lint:fix

  fix:
    desc: Auto-fix all ESLint issues across UI sub-projects
    cmds:
      - task: vscode:lint:fix

  ci:
    desc: Full CI pipeline across UI sub-projects
    cmds:
      - task: vscode:ci

  clean:
    desc: Remove build artefacts across UI sub-projects (vscode + studio-app)
    cmds:
      - task: vscode:clean
      - task: studio:clean

  app:
    desc: Build and launch the Cantica Studio Electron app
    cmds:
      - task: studio:start

  app:dev:
    desc: Launch the already-built Cantica Studio Electron app (no rebuild)
    cmds:
      - task: studio:dev

  clean:all:
    desc: Remove build artefacts and node_modules across UI sub-projects (vscode + studio-app)
    cmds:
      - task: vscode:clean:all
      - task: studio:clean:all
