# https://taskfile.dev
version: '3'

tasks:
  default:
    silent: true
    cmd: task --list

  install:
    desc: Install studio-api and cantica-api (editable) into the local virtualenv
    cmds:
      - pip install -e ../../cantica-api
      - pip install -e .

  serve:
    desc: Run the studio-api dev server (auto-reload, port 8043)
    env:
      CANTICA_HOST: "127.0.0.1"
      CANTICA_PORT: "8043"
    cmd: uvicorn cantica_studio_api.main:app --reload --host 127.0.0.1 --port 8043

  build:image:
    desc: Build the studio-api Docker image
    dir: ../..
    cmd: |
      docker build \
        -f cantica-studio/studio-api/Dockerfile \
        -t studio-api:latest \
        .

  update:
    desc: Rebuild image (no cache) and restart — use after any wheel or Dockerfile change
    dir: ../..
    cmds:
      - docker compose -f cantica-studio/studio-api/docker-compose.yml down
      - docker build --no-cache -f cantica-studio/studio-api/Dockerfile -t studio-api:latest .
      - docker compose -f cantica-studio/studio-api/docker-compose.yml up -d

  clean:
    desc: Remove the studio-api image and prune dangling images
    cmds:
      - docker compose down --rmi local 2>/dev/null || true
      - docker image rm cantica-studio-api:latest 2>/dev/null || true
      - docker image prune -f

  up:
    desc: Start studio-api via docker-compose
    cmd: docker compose up -d

  down:
    desc: Stop studio-api container
    cmd: docker compose down

  logs:
    desc: Follow studio-api container logs
    cmd: docker compose logs -f
